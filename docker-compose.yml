services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: symfonyoutboxsaga-php
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    depends_on:
      - postgres
      - redis
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    container_name: symfonyoutboxsaga-nginx
    depends_on:
      - php
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - internal

  postgres:
    image: postgres:16-alpine
    container_name: symfonyoutboxsaga-postgres
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres.${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD} 
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: symfonyoutboxsaga-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - internal


  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: symfonyoutboxsaga-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672" 
    networks:
      - internal

volumes:
  postgres_data:
  redis_data:


networks:
  internal:
    driver: bridge
